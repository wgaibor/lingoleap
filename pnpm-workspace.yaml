packages:
  - "apps/*"
  - "packages/*"
# El build nativo Android (CMake/prefab) de react-native-worklets llega a ~230 caracteres
# de profundidad bajo node_modules; acortar los nombres del virtual store de .pnpm da
# margen frente al límite de 260 (MAX_PATH) de Windows. Ver BITACORA Fase 4A.
virtualStoreDirMaxLength: 25
allowBuilds:
  '@swc/core': true
  esbuild: false
  msw: false
  unrs-resolver: false
# apps/mobile introduce react@19 / @types/react@19 al workspace. pnpm hoistea @types/* a un
# node_modules/.pnpm/node_modules compartido; sin este pin, react-router-dom (usado solo por
# apps/web, que sigue en React 18) resuelve los tipos de React contra la versión 19 hoisteada
# y rompe el build de apps/web (TS2786 "cannot be used as a JSX component"). Le fuerza su
# propia copia de @types/react en la línea 18.x.
# Expo Go 57.0.2 embebe nativamente reanimated 4.5.0 / worklets 0.10.0 (ver
# expo/bundledNativeModules.json); versiones JS más nuevas (4.5.1/0.10.2) rompen el ABI de
# worklets y crashean Hermes con SIGSEGV al abrir la app en Expo Go.
overrides:
  react-native-reanimated: 4.5.0
  react-native-worklets: 0.10.0
packageExtensions:
  react-router-dom:
    dependencies:
      '@types/react': '^18.3.0'
  react-router:
    dependencies:
      '@types/react': '^18.3.0'
